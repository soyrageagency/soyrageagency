<svg width="1000" height="180" viewBox="0 0 1000 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Footer — thanks for scrolling — designed and engineered by SoyRage, Valencia, Spain">
  <defs>
    <pattern id="fgrid" width="62" height="62" patternUnits="userSpaceOnUse">
      <path d="M62 0H0V62" fill="none" stroke="#141414" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <linearGradient id="ftint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.55" stop-color="#CBE9F2" stop-opacity="0"/>
      <stop offset="1" stop-color="#CBE9F2" stop-opacity="0.5"/>
    </linearGradient>
    <clipPath id="fpanel"><rect width="1000" height="180" rx="18"/></clipPath>
  </defs>

  <style>
    .disp { font-family:'Sora','Poppins','Segoe UI','Helvetica Neue',Arial,sans-serif; }
    .ui   { font-family:'SF Pro Text','Segoe UI',system-ui,Arial,sans-serif; }
    .meta { font-family:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace; }
    .pop  { animation: pop .55s cubic-bezier(.3,1.5,.4,1) both; transform-box: fill-box; transform-origin: 50% 100%; }
    .g1 { animation-delay:.2s } .g2 { animation-delay:.5s }
    .fade { animation: fin 1s cubic-bezier(.2,.6,.2,1) both; animation-delay:.75s }
    @keyframes pop { from { opacity:0; transform:scale(.85) } to { opacity:1; transform:scale(1) } }
    @keyframes fin { from { opacity:0 } to { opacity:1 } }
  </style>

  <g clip-path="url(#fpanel)">
    <rect width="1000" height="180" fill="#F0EEE9"/>
    <rect width="1000" height="180" fill="url(#fgrid)"/>
    <rect width="1000" height="180" fill="url(#ftint)"/>

    <!-- sign-off bubble (never below y=96) -->
    <g class="pop g1" transform="rotate(-1.5 470 56)">
      <rect x="377" y="42.5" width="186" height="34" rx="17" fill="#141414" opacity="0.10"/>
      <rect x="377" y="40" width="186" height="34" rx="17" fill="#3BA7E8"/>
      <text class="ui" x="470" y="61" text-anchor="middle" font-size="13.5" font-weight="600" fill="#FFFFFF">Thanks for scrolling!</text>
    </g>
    <g class="pop g2" transform="rotate(2.5 614 58)">
      <rect x="583" y="45.5" width="62" height="30" rx="15" fill="#141414" opacity="0.10"/>
      <rect x="583" y="43" width="62" height="30" rx="15" fill="#FFFFFF" stroke="#E7E4DC" stroke-width="1"/>
      <circle cx="603" cy="58" r="3.4" fill="#B9B4AA"><animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" begin="0s" repeatCount="indefinite"/></circle>
      <circle cx="614" cy="58" r="3.4" fill="#B9B4AA"><animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" begin="0.18s" repeatCount="indefinite"/></circle>
      <circle cx="625" cy="58" r="3.4" fill="#B9B4AA"><animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" begin="0.36s" repeatCount="indefinite"/></circle>
    </g>

    <text class="meta fade" x="500" y="104" text-anchor="middle" font-size="10.5" letter-spacing="2.4" fill="#8A857C">DESIGNED &amp; ENGINEERED BY SOYRAGE <tspan fill="#3BA7E8">—</tspan> VALENCIA, SPAIN</text>

    <!-- ghost wordmark, cropped by the bottom edge (glyph tops ≈ y=146) -->
    <text class="disp" x="500" y="232" text-anchor="middle" font-size="120" font-weight="800" letter-spacing="18" fill="#141414" opacity="0.06">SOY<tspan fill="#3BA7E8" fill-opacity="0.7">R</tspan>AGE</text>
  </g>

  <rect x="0.6" y="0.6" width="998.8" height="178.8" rx="17.4" stroke="#DDD8CE" stroke-width="1.2"/>
</svg>
