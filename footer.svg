<svg width="1000" height="170" viewBox="0 0 1000 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Footer — thanks for scrolling — designed and engineered by SoyRage, Valencia, Spain">
  <defs>
    <linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#120A26"/>
      <stop offset="0.5"  stop-color="#2E1546"/>
      <stop offset="0.82" stop-color="#6E2657"/>
      <stop offset="1"    stop-color="#C94B6F"/>
    </linearGradient>
    <linearGradient id="frule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#FFD9A0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFD9A0" stop-opacity="0.85"/>
      <stop offset="1"   stop-color="#FFD9A0" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="fpanel"><rect width="1000" height="170" rx="18"/></clipPath>
  </defs>

  <style>
    .disp { font-family:'Sora','Poppins','Segoe UI','Helvetica Neue',Arial,sans-serif; }
    .meta { font-family:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace; }
    .fade { animation: fin 1.1s cubic-bezier(.2,.6,.2,1) both; }
    .f1 { animation-delay:.15s } .f2 { animation-delay:.35s } .f3 { animation-delay:.55s }
    @keyframes fin { from { opacity:0 } to { opacity:1 } }
  </style>

  <g clip-path="url(#fpanel)">
    <rect width="1000" height="170" fill="url(#dusk)"/>

    <!-- sky content: never below y=104 -->
    <rect class="fade f1" x="370" y="34" width="260" height="1.5" fill="url(#frule)"/>
    <text class="disp fade f2" x="500" y="66" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="5" fill="#FFF7EA" fill-opacity="0.95">THANKS FOR SCROLLING</text>
    <text class="meta fade f3" x="500" y="94" text-anchor="middle" font-size="10.5" letter-spacing="2.4" fill="#C9AEC9">DESIGNED &amp; ENGINEERED BY SOYRAGE <tspan fill="#FFD9A0">—</tspan> VALENCIA, SPAIN</text>

    <!-- ground -->
    <rect y="126" width="1000" height="44" fill="#150A26"/>
    <line x1="0" y1="126" x2="1000" y2="126" stroke="#FFD9A0" stroke-opacity="0.5" stroke-width="1.5"/>

    <!-- ghost wordmark, cropped by the bottom edge (top of glyphs ≈ y=132) -->
    <text class="disp" x="500" y="218" text-anchor="middle" font-size="120" font-weight="800" letter-spacing="18" fill="#FFF7EA" opacity="0.12">SOYRAGE</text>

    <!-- moonlit rabbit on the horizon -->
    <g transform="translate(884 126) scale(0.58)">
      <g fill="#FFF7EA" fill-opacity="0.92">
        <ellipse cx="6" cy="-22" rx="22" ry="22"/>
        <circle cx="-12" cy="-34" r="13"/>
        <circle cx="-16" cy="-56" r="13"/>
        <ellipse cx="-22" cy="-82" rx="5.5" ry="19" transform="rotate(-10 -22 -66)"/>
        <g>
          <animateTransform attributeName="transform" type="rotate" values="0;0;11;-4;0" keyTimes="0;.72;.8;.88;1" dur="5.2s" repeatCount="indefinite"/>
          <ellipse cx="-9" cy="-84" rx="5.5" ry="20" transform="rotate(12 -9 -66)"/>
        </g>
        <rect x="-26" y="-14" width="7" height="15" rx="3.5"/>
        <circle cx="26" cy="-15" r="6.5"/>
      </g>
    </g>
  </g>

  <rect x="0.75" y="0.75" width="998.5" height="168.5" rx="17.25" stroke="#FFD9A0" stroke-opacity="0.3" stroke-width="1.5"/>
</svg>
