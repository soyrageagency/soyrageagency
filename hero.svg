    <!-- bottom meta -->
    <polygon points="46.0,306.0 48.1,311.1 53.6,311.5 49.4,315.1 50.7,320.5 46.0,317.6 41.3,320.5 42.6,315.1 38.4,311.5 43.9,311.1" fill="#F2788C" stroke="#12232A" stroke-width="2.5"/>
    <text class="meta" x="62" y="318" font-size="11.5" letter-spacing="2.2" fill="#FFF4E4" fill-opacity="0.9">AVAILABLE FOR AMBITIOUS PROJECTS</text>
    <text class="meta" x="956" y="318" text-anchor="end" font-size="11.5" letter-spacing="2.2" fill="#9FB8BE">VALENCIA · SPAIN <tspan fill="#35E0F0">—</tspan> SOYRAGE.ES</text>
