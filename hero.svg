<svg width="1000" height="320" viewBox="0 0 1000 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SoyRage — Senior Full-Stack Developer and Infrastructure Engineer">
  <defs>
    <linearGradient id="wordmark" x1="240" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="0.45" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="rule" x1="280" y1="0" x2="720" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#8B5CF6" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="blobViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#0EA5E9" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobIndigo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#4F46E5" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <clipPath id="frame">
      <rect width="1000" height="320" rx="18"/>
    </clipPath>
  </defs>

  <style>
    text { font-family: 'Segoe UI', Ubuntu, 'Helvetica Neue', Arial, sans-serif; }
    .mono { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, 'DejaVu Sans Mono', monospace; }
    .fade { animation: fadeIn 0.9s cubic-bezier(.2,.6,.2,1) both; }
    .d1 { animation-delay: .15s } .d2 { animation-delay: .4s } .d3 { animation-delay: .7s }
    .d4 { animation-delay: 1.0s } .d5 { animation-delay: 1.25s } .d6 { animation-delay: 1.45s }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    .pulse { animation: pulse 2.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .2 } }
  </style>

  <g clip-path="url(#frame)">
    <rect width="1000" height="320" fill="#07070C"/>

    <!-- aurora field -->
    <g filter="url(#soft)">
      <ellipse cx="200" cy="60" rx="320" ry="180" fill="url(#blobViolet)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 70 34; 0 0" dur="15s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="830" cy="290" rx="330" ry="190" fill="url(#blobCyan)">
        <animateTransform attributeName="transform" type="translate" values="0 0; -80 -30; 0 0" dur="18s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="640" cy="30" rx="220" ry="130" fill="url(#blobIndigo)">
        <animateTransform attributeName="transform" type="translate" values="0 0; -40 40; 0 0" dur="13s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- blueprint grid -->
    <rect width="1000" height="320" fill="url(#grid)"/>

    <!-- corner registration marks -->
    <g stroke="#8B5CF6" stroke-opacity="0.35" stroke-width="1.4">
      <path d="M40 34v12M34 40h12"/>
      <path d="M960 34v12M954 40h12"/>
      <path d="M40 274v12M34 280h12"/>
      <path d="M960 274v12M954 280h12"/>
    </g>

    <!-- eyebrow -->
    <text class="mono fade d1" x="500" y="104" text-anchor="middle" font-size="12" letter-spacing="5" fill="#8B949E">FOUNDER — SOYRAGE AGENCY <tspan fill="#22D3EE">×</tspan> PLENIXNETWORK</text>

    <!-- wordmark glow -->
    <text class="fade d2" x="500" y="188" text-anchor="middle" font-size="78" font-weight="800" letter-spacing="12" fill="#8B5CF6" opacity="0.55" filter="url(#glow)">SOYRAGE</text>
    <!-- wordmark -->
    <text class="fade d2" x="500" y="188" text-anchor="middle" font-size="78" font-weight="800" letter-spacing="12" fill="url(#wordmark)">SOYRAGE</text>

    <!-- role line -->
    <text class="mono fade d3" x="500" y="228" text-anchor="middle" font-size="14.5" letter-spacing="4.5" fill="#B4BDC9">FULL-STACK DEVELOPER <tspan fill="#8B5CF6" font-weight="700">×</tspan> INFRASTRUCTURE ENGINEER</text>

    <!-- hairline rule -->
    <rect class="fade d4" x="280" y="250" width="440" height="1.5" fill="url(#rule)"/>

    <!-- bottom meta -->
    <g class="fade d5">
      <circle class="pulse" cx="72" cy="285" r="4" fill="#34D399"/>
      <text class="mono" x="86" y="289" font-size="11.5" letter-spacing="2.5" fill="#8B949E">AVAILABLE FOR AMBITIOUS PROJECTS</text>
    </g>
    <text class="mono fade d6" x="936" y="289" text-anchor="end" font-size="11.5" letter-spacing="2.5" fill="#8B949E">VALENCIA · SPAIN <tspan fill="#22D3EE">—</tspan> SOYRAGE.ES</text>
  </g>

  <!-- frame border -->
  <rect x="0.75" y="0.75" width="998.5" height="318.5" rx="17.25" stroke="#8B5CF6" stroke-opacity="0.28" stroke-width="1.5"/>
</svg>
