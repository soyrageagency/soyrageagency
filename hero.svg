      <text class="meta" x="50" y="47" font-size="12" font-weight="700" letter-spacing="1.6" fill="#12232A">FOUNDER — SOYRAGE AGENCY <tspan fill="#8C2F44">✕</tspan> PLENIXNETWORK</text>
    </g>

