        <polygon points="0.0,-96.0 17.1,-63.8 48.0,-83.1 46.7,-46.7 83.1,-48.0 63.8,-17.1 96.0,0.0 63.8,17.1 83.1,48.0 46.7,46.7 48.0,83.1 17.1,63.8 0.0,96.0 -17.1,63.8 -48.0,83.1 -46.7,46.7 -83.1,48.0 -63.8,17.1 -96.0,0.0 -63.8,-17.1 -83.1,-48.0 -46.7,-46.7 -48.0,-83.1 -17.1,-63.8" fill="#0B5E6E" stroke="#12232A" stroke-width="4" transform="scale(2.05 1.02) rotate(12)"/>
        <polygon points="0.0,-96.0 17.1,-63.8 48.0,-83.1 46.7,-46.7 83.1,-48.0 63.8,-17.1 96.0,0.0 63.8,17.1 83.1,48.0 46.7,46.7 48.0,83.1 17.1,63.8 0.0,96.0 -17.1,63.8 -48.0,83.1 -46.7,46.7 -83.1,48.0 -63.8,17.1 -96.0,0.0 -63.8,-17.1 -83.1,-48.0 -46.7,-46.7 -48.0,-83.1 -17.1,-63.8" fill="#F2788C" stroke="#12232A" stroke-width="4" transform="scale(1.85 0.92)"/>
