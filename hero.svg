<svg width="1000" height="340" viewBox="0 0 1000 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SoyRage — cartoon hero — Senior Full-Stack Developer and Infrastructure Engineer">
  <defs>
    <clipPath id="panel"><rect width="1000" height="340" rx="18"/></clipPath>
    <pattern id="halftone" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.7" fill="#FFFFFF" fill-opacity="0.05"/>
    </pattern>
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#0FB4C4" stop-opacity="0.30"/><stop offset="1" stop-color="#0FB4C4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCoral" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#F2788C" stop-opacity="0.26"/><stop offset="1" stop-color="#F2788C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .disp { font-family:'Fredoka','Baloo 2','Comic Sans MS','Trebuchet MS',Verdana,sans-serif; }
    .meta { font-family:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace; }
  </style>

  <g clip-path="url(#panel)">
    <rect width="1000" height="340" fill="#071A20"/>
    <ellipse cx="180" cy="60" rx="300" ry="180" fill="url(#glowTeal)"/>
    <ellipse cx="840" cy="290" rx="300" ry="180" fill="url(#glowCoral)"/>
    <rect width="1000" height="340" fill="url(#halftone)"/>

    <!-- comic speed lines -->
    <g stroke="#35E0F0" stroke-opacity="0.14" stroke-linecap="round">
      <line x1="930" y1="18" x2="984" y2="-8" stroke-width="6"/>
      <line x1="900" y1="40" x2="990" y2="-2" stroke-width="4"/>
      <line x1="946" y1="60" x2="1010" y2="30" stroke-width="3"/>
      <line x1="16" y1="322" x2="70" y2="348" stroke-width="6"/>
      <line x1="10" y1="296" x2="100" y2="342" stroke-width="4"/>
    </g>

    <!-- caption box (comic style) -->
