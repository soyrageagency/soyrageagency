      <rect x="804" y="100" width="16" height="26" rx="7" fill="#F2788C" stroke="#12232A" stroke-width="3.5"/>
      <rect x="884" y="100" width="16" height="26" rx="7" fill="#F2788C" stroke="#12232A" stroke-width="3.5"/>
