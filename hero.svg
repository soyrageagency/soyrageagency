      <text class="meta" x="794" y="196" text-anchor="middle" font-size="15" font-weight="800" fill="#35E0F0">&lt;/&gt;</text>
      <rect x="762" y="208" width="60" height="9" rx="4" fill="#0B2A31" stroke="#12232A" stroke-width="3.5"/>
