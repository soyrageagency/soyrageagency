      <path d="M86 128 a22 22 0 0 1 22-22 a26 26 0 0 1 50-6 a20 20 0 0 1 14 34 q2 12 -12 14 H98 q-14 -2 -12 -20 Z" fill="#FFF7EA" stroke="#12232A" stroke-width="4" stroke-linejoin="round"/>
