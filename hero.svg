<svg width="1000" height="320" viewBox="0 0 1000 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SoyRage — Senior Full-Stack Developer and Infrastructure Engineer — brand hero with chat bubbles">
  <defs>
    <pattern id="grid" width="62" height="62" patternUnits="userSpaceOnUse">
      <path d="M62 0H0V62" fill="none" stroke="#141414" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <linearGradient id="tint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.62" stop-color="#CBE9F2" stop-opacity="0"/>
      <stop offset="1" stop-color="#CBE9F2" stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="panel"><rect width="1000" height="320" rx="18"/></clipPath>
  </defs>

  <style>
    .disp { font-family:'Sora','Poppins','Segoe UI','Helvetica Neue',Arial,sans-serif; }
    .ui   { font-family:'SF Pro Text','Segoe UI',system-ui,Arial,sans-serif; }
    .meta { font-family:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace; }
    .fade { animation: fin 0.9s cubic-bezier(.2,.6,.2,1) both; }
    .d1 { animation-delay:.1s } .d2 { animation-delay:.3s }
    .pop  { animation: pop .55s cubic-bezier(.3,1.5,.4,1) both; transform-box: fill-box; transform-origin: 50% 100%; }
    .b1 { animation-delay:.55s } .b2 { animation-delay:.85s }
    .b3 { animation-delay:1.15s } .b4 { animation-delay:1.45s }
    @keyframes fin { from { opacity:0 } to { opacity:1 } }
    @keyframes pop { from { opacity:0; transform:scale(.85) } to { opacity:1; transform:scale(1) } }
  </style>

  <g clip-path="url(#panel)">
    <rect width="1000" height="320" fill="#F0EEE9"/>
    <rect width="1000" height="320" fill="url(#grid)"/>
    <rect width="1000" height="320" fill="url(#tint)"/>

    <!-- wordmark: SOY R AGE, R in brand blue -->
    <text class="disp fade d1" x="500" y="150" text-anchor="middle" font-size="88" font-weight="800" letter-spacing="6" fill="#141414">SOY<tspan fill="#3BA7E8">R</tspan>AGE</text>

    <!-- spaced subtitle -->
    <text class="meta fade d2" x="500" y="192" text-anchor="middle" font-size="13" letter-spacing="6" fill="#141414" fill-opacity="0.88">FULL-STACK DEVELOPER <tspan fill="#3BA7E8">×</tspan> INFRASTRUCTURE ENGINEER</text>

    <!-- conversation -->
    
    <g class="pop b1" transform="rotate(-2.5 432 238)">
      <rect x="328.0" y="224.5" width="208" height="32" rx="16" fill="#141414" opacity="0.10"/>
      <rect x="328.0" y="222.0" width="208" height="32" rx="16" fill="#FFFFFF" stroke="#E7E4DC" stroke-width="1"/>
      <text class="ui" x="432" y="242.5" text-anchor="middle" font-size="13" font-weight="600" fill="#141414">Founder @ SoyRage Agency</text>
    </g>
    
    <g class="pop b2" transform="rotate(2 566 268)">
      <rect x="428.0" y="254.5" width="276" height="32" rx="16" fill="#141414" opacity="0.10"/>
      <rect x="428.0" y="252.0" width="276" height="32" rx="16" fill="#3BA7E8"/>
      <text class="ui" x="566" y="272.5" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Collaborator @ RageStudio ✕ Comty</text>
    </g>
    
    <g class="pop b3" transform="rotate(-1.5 452 296)">
      <rect x="326.0" y="282.5" width="252" height="32" rx="16" fill="#141414" opacity="0.10"/>
      <rect x="326.0" y="280.0" width="252" height="32" rx="16" fill="#FFFFFF" stroke="#E7E4DC" stroke-width="1"/>
      <text class="ui" x="452" y="300.5" text-anchor="middle" font-size="13" font-weight="600" fill="#141414">Valencia, Spain · open to work.</text>
    </g>
    
    <g class="pop b4" transform="rotate(3 636 296)">
      <rect x="605" y="283.5" width="62" height="30" rx="15" fill="#141414" opacity="0.10"/>
      <rect x="605" y="281" width="62" height="30" rx="15" fill="#FFFFFF" stroke="#E7E4DC" stroke-width="1"/>
      <circle cx="625" cy="296" r="3.4" fill="#B9B4AA"><animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" begin="0.00s" repeatCount="indefinite"/></circle><circle cx="636" cy="296" r="3.4" fill="#B9B4AA"><animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" begin="0.18s" repeatCount="indefinite"/></circle><circle cx="647" cy="296" r="3.4" fill="#B9B4AA"><animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" begin="0.36s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <rect x="0.6" y="0.6" width="998.8" height="318.8" rx="17.4" stroke="#DDD8CE" stroke-width="1.2"/>
</svg>
