      <path d="M864 214 v14" stroke="#12232A" stroke-width="13" stroke-linecap="round"/>
      <path d="M840 214 v12" stroke="#0B5E6E" stroke-width="8" stroke-linecap="round"/>
      <path d="M864 214 v12" stroke="#0B5E6E" stroke-width="8" stroke-linecap="round"/>
      <ellipse cx="840" cy="232" rx="9" ry="6" fill="#12232A"/>
      <ellipse cx="864" cy="232" rx="9" ry="6" fill="#12232A"/>

