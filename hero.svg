      <animate attributeName="opacity" values="1;.25;1" dur="2.4s" begin="1.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.25;1" dur="2.4s" begin="1.3s" repeatCount="indefinite" additive="sum"/>
    </polygon></g>
    <g transform="translate(214 286)"><polygon points="0.0,-6.0 1.5,-1.5 6.0,0.0 1.5,1.5 0.0,6.0 -1.5,1.5 -6.0,0.0 -1.5,-1.5" fill="#35E0F0" stroke="#12232A" stroke-width="2.5">
      <animate attributeName="opacity" values="1;.25;1" dur="2.4s" begin="1.9s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.25;1" dur="2.4s" begin="1.9s" repeatCount="indefinite" additive="sum"/>
