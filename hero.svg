      <path d="M858 122 q6 -8 12 0" stroke="#12232A" stroke-width="4" stroke-linecap="round" fill="none"/>
      <circle cx="832" cy="134" r="4.6" fill="#F2788C" opacity="0.75"/>
      <circle cx="872" cy="134" r="4.6" fill="#F2788C" opacity="0.75"/>
      <path d="M844 136 q8 9 16 0" stroke="#12232A" stroke-width="4" stroke-linecap="round" fill="none"/>

      <!-- laptop arm -->
