      <line x1="106" y1="207" x2="134" y2="207" stroke="#9FB8BE" stroke-width="3" stroke-linecap="round"/>
      <line x1="106" y1="221" x2="134" y2="221" stroke="#9FB8BE" stroke-width="3" stroke-linecap="round"/>
      <circle cx="149" cy="207" r="3.4" fill="#35E0F0"><animate attributeName="opacity" values="1;.15;1" dur="1s" repeatCount="indefinite"/></circle>
