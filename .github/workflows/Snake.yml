name: Generate Snake Animation

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: soyrageagency
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#3BA7E8&color_dots=#DCEFFB,#A8D8F5,#6FBDEE,#3BA7E8,#1E7CC2
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#3BA7E8&color_dots=#161B22,#0E3A57,#1E6EA7,#3BA7E8,#9BD3F5

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
